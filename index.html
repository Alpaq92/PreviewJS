<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ReaderJS — Universal Document Viewer</title>
  <link rel="stylesheet" href="/src/style.css" />
  <!-- WebODF is loaded on-demand by odf-renderer.js when an ODF file is opened -->
</head>
<body>
  <div id="outerContainer">

    <!-- Sidebar: thumbnails + outline -->
    <div id="sidebarContainer">
      <div id="sidebarToolbar">
        <button id="thumbsBtn" class="sidebar-tab active" title="Page Thumbnails">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path d="M3,11H11V3H3M3,21H11V13H3M13,21H21V13H13M13,3V11H21V3" />
          </svg>
        </button>
        <button id="outlineBtn" class="sidebar-tab" title="Document Outline">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path d="M7,5H21V7H7V5M7,13V11H21V13H7M4,4.5A1.5,1.5 0 0,1 5.5,6A1.5,1.5 0 0,1 4,7.5A1.5,1.5 0 0,1 2.5,6A1.5,1.5 0 0,1 4,4.5M4,10.5A1.5,1.5 0 0,1 5.5,12A1.5,1.5 0 0,1 4,13.5A1.5,1.5 0 0,1 2.5,12A1.5,1.5 0 0,1 4,10.5M7,19V17H21V19H7M4,16.5A1.5,1.5 0 0,1 5.5,18A1.5,1.5 0 0,1 4,19.5A1.5,1.5 0 0,1 2.5,18A1.5,1.5 0 0,1 4,16.5Z" />
          </svg>
        </button>
      </div>
      <div id="sidebarContent">
        <div id="thumbsContent"></div>
        <div id="outlineContent" class="hidden"></div>
      </div>
    </div>

    <!-- Main content -->
    <div id="mainContainer">

      <!-- Top toolbar -->
      <div id="toolbarContainer">
        <div id="toolbarLeft">
          <button id="sidebarToggle" class="toolbar-btn" title="Toggle Sidebar">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z" />
            </svg>
          </button>

          <div class="toolbar-separator"></div>

          <button id="prevPage" class="toolbar-btn" title="Previous Page (←)" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path d="M15.41,16.58L10.83,12L15.41,7.41L14,6L8,12L14,18L15.41,16.58Z" />
            </svg>
          </button>

          <div id="pageNumberGroup">
            <input id="pageNumber" type="number" value="1" min="1" max="1" title="Current Page" />
            <span class="page-sep">/</span>
            <span id="totalPages">—</span>
          </div>

          <button id="nextPage" class="toolbar-btn" title="Next Page (→)" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z" />
            </svg>
          </button>
        </div>

        <div id="toolbarMiddle">
          <button id="zoomOut" class="toolbar-btn" title="Zoom Out (Ctrl -)">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M15.5,14H14.71L14.43,13.73C15.41,12.59 16,11.11 16,9.5A6.5,6.5 0 0,0 9.5,3A6.5,6.5 0 0,0 3,9.5A6.5,6.5 0 0,0 9.5,16C11.11,16 12.59,15.41 13.73,14.43L14,14.71V15.5L19,20.5L20.5,19L15.5,14M9.5,14C7,14 5,12 5,9.5C5,7 7,5 9.5,5C12,5 14,7 14,9.5C14,12 12,14 9.5,14M7,9H12V10H7V9Z" />
            </svg>
          </button>

          <select id="scaleSelect" title="Zoom">
            <option value="auto">Auto</option>
            <option value="page-fit">Page Fit</option>
            <option value="page-width">Page Width</option>
            <option value="page-height">Fit Height</option>
            <option value="0.5">50%</option>
            <option value="0.75">75%</option>
            <option value="1" selected>100%</option>
            <option value="1.25">125%</option>
            <option value="1.5">150%</option>
            <option value="2">200%</option>
            <option value="3">300%</option>
          </select>

          <button id="zoomIn" class="toolbar-btn" title="Zoom In (Ctrl +)">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M15.5,14L20.5,19L19,20.5L14,15.5V14.71L13.73,14.43C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.43,13.73L14.71,14H15.5M9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14M12,10H10V12H9V10H7V9H9V7H10V9H12V10Z" />
            </svg>
          </button>
        </div>

        <div id="toolbarRight">
          <span id="formatBadge" class="hidden"></span>

          <div class="toolbar-separator"></div>

          <button id="printBtn" class="toolbar-btn" title="Print (Ctrl+P)">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M18,3H6V7H18M19,12A1,1 0 0,1 18,11A1,1 0 0,1 19,10A1,1 0 0,1 20,11A1,1 0 0,1 19,12M16,19H8V14H16M19,8H5A3,3 0 0,0 2,11V17H6V21H18V17H22V11A3,3 0 0,0 19,8Z" />
            </svg>
          </button>

          <label class="toolbar-btn" for="fileInput" title="Open File">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M19,20H4C2.89,20 2,19.1 2,18V6C2,4.89 2.89,4 4,4H10L12,6H19A2,2 0 0,1 21,8H21L4,8V18L6.14,10H23.21L20.93,18.5C20.7,19.37 19.92,20 19,20Z" />
            </svg>
          </label>
          <input id="fileInput" type="file"
            accept=".pdf,.odt,.ods,.odp,.odg,.odm,.odf,.rtf,.doc,.docx,.md,.markdown,.txt,.text,.log,.cbz,.cbr,.cbt,.epub,.mobi,.azw3,.azw,.kf8"
            aria-label="Open document file" />
        </div>
      </div>

      <!-- Loading bar -->
      <div id="loadingBar" class="hidden">
        <div id="loadingBarProgress"></div>
      </div>

      <!-- Error bar -->
      <div id="errorBar" class="hidden" role="alert">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="flex-shrink:0">
          <path d="M13,13H11V7H13M13,17H11V15H13M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z" />
        </svg>
        <span id="errorMsg"></span>
        <button id="errorClose" aria-label="Dismiss">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
            <path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" />
          </svg>
        </button>
      </div>

      <!-- Viewer -->
      <div id="viewerContainer">

        <!-- Drop zone (shown when no file loaded) -->
        <div id="dropzone">
          <div id="dropzoneContent">
            <div id="dropzoneIcon">
              <svg viewBox="0 0 24 24" width="72" height="72" fill="#90caf9">
                <path d="M14,2L20,8V20A2,2 0 0,1 18,22H6A2,2 0 0,1 4,20V4A2,2 0 0,1 6,2H14M18,20V9H13V4H6V20H18M12,12L16,16H13.5V19H10.5V16H8L12,12Z" />
              </svg>
            </div>
            <h2>Open a Document</h2>
            <p>Drop a file here, or <label for="fileInput">browse</label></p>
            <div class="format-tags">
              <span class="format-tag tag-pdf">PDF</span>
              <span class="format-tag tag-odf">ODT</span>
              <span class="format-tag tag-odf">ODS</span>
              <span class="format-tag tag-odf">ODP</span>
              <span class="format-tag tag-rtf">RTF</span>
              <span class="format-tag tag-doc">DOC</span>
              <span class="format-tag tag-docx">DOCX</span>
              <span class="format-tag tag-md">MD</span>
              <span class="format-tag tag-txt">TXT</span>
              <span class="format-tag tag-comic">CBZ</span>
              <span class="format-tag tag-comic">CBR</span>
              <span class="format-tag tag-comic">CBT</span>
              <span class="format-tag tag-epub">EPUB</span>
              <span class="format-tag tag-epub">MOBI</span>
              <span class="format-tag tag-epub">AZW3</span>
            </div>
            <div class="powered-by">
              Powered by
              <a href="https://github.com/mozilla/pdf.js" target="_blank" rel="noopener">PDF.js</a>
              · <a href="https://github.com/Alpaq92/JSDoc" target="_blank" rel="noopener">JSDoc</a>
              · <a href="https://github.com/tbluemel/rtf.js" target="_blank" rel="noopener">RTF.js</a>
              · <a href="https://github.com/mwilliamson/mammoth.js" target="_blank" rel="noopener">mammoth.js</a>
              · <a href="https://github.com/johnfactotum/foliate-js" target="_blank" rel="noopener">foliate-js</a>
            </div>
          </div>
        </div>

        <!-- Document render target -->
        <div id="docContainer" class="hidden"></div>

      </div><!-- /viewerContainer -->
    </div><!-- /mainContainer -->
  </div><!-- /outerContainer -->

  <!-- Print layer: populated by PDF renderer before window.print() -->
  <div id="printLayer" aria-hidden="true"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
